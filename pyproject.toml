[tool.black]
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# FastAPI's dependency-injection idiom requires Depends(...) in argument
# defaults - the opposite of what B008 normally flags.
"backend/routers/*.py" = ["B008"]
"backend/auth.py" = ["B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
