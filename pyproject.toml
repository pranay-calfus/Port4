[tool.black]
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic-generated migration files follow Alembic's own template
# conventions, not this project's style - not worth hand-editing to match.
exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# FastAPI's dependency-injection idiom requires Depends(...) in argument
# defaults - the opposite of what B008 normally flags.
"backend/routers/*.py" = ["B008"]
"backend/auth.py" = ["B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "live_llm: hits the real OpenAI API - opt-in only, see tests/integration/test_feedback_classifier_live.py",
]
